            padding: 30px;
            width: 90%;
            max-width: 500px;

            border: 2px solid rgba(255, 255, 255, 0.5);

        }

        }

            color: #d81b60;

        }

            color: #666;
            margin-bottom: 25px;

        }

            margin-bottom: 25px;
        }

            background: #fff;
            border: 2px solid #ff7eb3;
            color: #d81b60;
            padding: 10px;
            border-radius: 10px;
            font-family: inherit;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .category-btn:hover, .category-btn.active {
            background: #ff7eb3;
            color: #fff;
            box-shadow: 0 4px 10px rgba(255, 126, 179, 0.4);
        }

        .card-display {
            background: #fff;
            min-height: 150px;
            border-radius: 15px;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: bold;
            color: #444;
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.05);
            margin-bottom: 25px;
            border: 1px dashed #ff758c;
            line-height: 1.6;
            word-wrap: break-word;
        }

        .action-btn {
            background: linear-gradient(135deg, #d81b60 0%, #ad1457 100%);
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            font-family: inherit;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            width: 100%;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .action-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(216, 27, 96, 0.4);
        }

        .action-btn:active {
            transform: scale(0.95);

</head>

                "3. أن يغمض عينيه تماماً ويتركها تستكشف جسده بيديها ولسانها دون حراك.",
                "4. أن يقوم بنزع ملابسها قطعة قطعة ببطء شديد وبأسنانه فقط.",
                "5. أن يهمس في أذنها بأجرأ الكلمات التي تخطر بباله أثناء العلاقة.",
                "6. أن يمسك يديها بقوة فوق رأسها أثناء التقبيل العميق.",
                "7. أن يمنعها من الكلام ويجعل تواصلهما بالأنفاس واللمس فقط.",
                "8. أن يصف لها جمال جسدها قطعة قطعة وهو يلمس كل جزء يصفه.",
                "9. أن يطلب منها أن تكون 'ملكاً له' الليلة وينفذ كل رغباته.",
                "10. أن يقوم بتمشيط شعرها ببطء ثم يجذبه برقة للخلف ليكشف عنقها.",
                "11. أن يركز تقبيله على منطقة 'الترقوة' والعنق لمدة 5 دقائق كاملة.",
                "12. أن يستخدم 'لحية' أو 'شارب' (إذا وجد) لمداعبة بشرتها الرقيقة.",
                "13. أن يلعق باطن كفها وأصابعها واحداً تلو الآخر ببطء.",
                "14. أن يقوم بتدليك فخذيها من الداخل بلمسات خفيفة جداً تثير القشعريرة.",
                "15. أن يستخدم 'مكعب ثلج' ويمرره على صدرها ثم يدفئه بأنفاسه الساخنة.",
                "16. أن يقبل كل إنش في ظهرها بدءاً من الرقبة وصولاً لأسفل الظهر.",
                "17. أن يستخدم زيت مساج دافئ ويدلك جسدها بالكامل باستخدام صدره.",
                "18. أن يعض شفتها السفلية عضة خفيفة ومثيرة أثناء القبلة.",
                "19. أن يداعب منطقة 'خلف الركبة' بلسانه، فهي منطقة شديدة الحساسية.",
                "20. أن يغسل جسدها بالرغبة والماء الدافئ أثناء الاستحمام معاً.",
                "21. أن ينظر في عينيها مباشرة وبقوة دون أن يرمش أثناء العلاقة.",
                "22. أن يقوم بممارسة العلاقة أمام مرآة كبيرة ليراها وهي في قمة رغبتها.",
                "23. أن يرتدي ملابس معينة تحبها هي عليه (مثل قميص رسمي مفتوح الأزرار).",
                "24. أن يراقبها وهي تداعب نفسها أمامه تحت الأضواء الخافتة.",
                "25. أن يضع 'عصابة العين' عليها ويفاجئها بلمسات في أماكن غير متوقعة.",
                "26. أن يصور لها مقطع فيديو صغيراً وهو يعبر عن رغبته بها (ليراها لاحقاً).",
                "27. أن يحصرها بينه وبين الحائط ويقبلها بقوة وجنون.",
                "28. أن يرفعها لتجلس على 'طاولة المطبخ' ويبدأ بمداعبتها هناك.",
                "29. أن يترك أثر قبلة (Hickey) في مكان ظاهر قليلاً ليكون 'سرهما الخاص'.",
                "30. أن يرقص معها رقصاً متلاصقاً جداً دون أي فواصل.",
                "31. أن يحكي لها 'قصة جريئة' من خياله يكونان هما أبطالها.",
                "32. أن يمارس معها العلاقة في مكان مختلف (مثل الكنبة، السجادة، أو الكرسي).",
                "33. أن يطلب منها 'وضعية جديدة' تماماً لم يجرباها من قبل.",
                "34. أن يستخدم 'الخيط أو الوشاح' لربط يديها برقة ليزيد من شعور الاستسلام.",
                "35. أن يداعبها فموياً ببطء شديد حتى تترجاه للتوقف أو الإكمال.",
                "36. أن يتحدث معها بلغة 'جريئة وصريحة' جداً تكسر حاجز الخجل.",
                "37. أن يوصلها لحافة الذروة عدة مرات ثم يتوقف فجأة ليزيد من تشويقها.",
                "38. أن يستخدم 'الفواكه أو الشوكولاتة' في مداعبة جسدها.",
                "39. أن يطلب منها ممارسة العلاقة 'بسرعة وجنون' كأنهما في مغامرة.",
                "40. أن يهمس لها بأسماء 'أدوار تنكرية' يود منها أن تمثلها معه.",
                "41. أن ينام في حضنها تماماً بعد العلاقة ويخبرها كم هي مثيرة.",
                "42. أن يمسك يدها تحت الطاولة وسط الناس ويقوم بحركات جريئة سراً.",
                "43. أن يرسل لها رسالة نصية حارة جداً وهو في العمل تمهيداً لليل.",
                "44. أن يقبل باطن قدميها كنوع من الدلال والتقدير.",
                "45. أن يجعل الليلة كاملة 'للمداعبة فقط' دون الوصول للعلاقة الكاملة لزيادة الشوق.",
                "46. أن يضع عطرها المفضل على جسده قبل النوم.",
                "47. أن يستمع لطلباتها هي وينفذها بالحرف الواحد دون نقاش.",
                "48. أن يباغتها بقبلة فرنسية عميقة وهي مشغولة بعمل منزلي.",
                "49. أن يقضي ساعة كاملة في 'التلامس الجلدي' فقط تحت اللحاف.",
                "50. أن يرمي النرد، والرقم الذي يظهر يجعله 'عبداً لرغباتها' لمدة ساعة!"
            ]
        };

        let currentData = JSON.parse(JSON.stringify(gameData));
        let activeCategory = 'questions';

        function setCategory(category) {
            activeCategory = category;
            
            document.querySelectorAll('.category-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            
            const count = currentData[activeCategory].length;
            document.getElementById('displayText').innerText = `تم اختيار القسم.. متبقي ${count} بطاقة. اسحب الآن!`;
        }

        function drawCard() {
            const items = currentData[activeCategory];
            
            if (items.length === 0) {
                document.getElementById('displayText').innerText = "لقد انتهت جميع أوراق هذا القسم! سيتم إعادة خلط الأوراق لتلعبوا من جديد.";
                currentData[activeCategory] = [...gameData[activeCategory]];
                return;
            }

            const randomIndex = Math.floor(Math.random() * items.length);
            const selectedText = items[randomIndex];

            items.splice(randomIndex, 1);

            const displayObj = document.getElementById('displayText');
            displayObj.style.opacity = 0;
            
            setTimeout(() => {
                displayObj.innerText = selectedText;
                displayObj.style.opacity = 1;
                displayObj.style.transition = "opacity 0.5s ease-in-out";
            }, 200);
        }
    </script>
</body>
</html>
